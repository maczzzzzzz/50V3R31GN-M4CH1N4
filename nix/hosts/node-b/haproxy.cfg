global
  log stdout format raw local0
  maxconn 2000

defaults
  log     global
  mode    http
  option  httplog
  option  dontlognull
  timeout connect 5000
  timeout client  300000
  timeout server  300000

frontend sovereign_mesh
  bind *:4000
  # Add CORS headers for Dashboard / Web UI
  http-response set-header Access-Control-Allow-Origin "*"
  http-response set-header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization"
  http-response set-header Access-Control-Allow-Methods "GET, POST, OPTIONS"
  
  # Handle OPTIONS requests for CORS preflight
  http-request return status 200 if METH_OPTIONS

  default_backend llm_nodes

backend llm_nodes
  balance roundrobin
  # llama.cpp server health endpoint
  option httpchk GET /health
  http-check expect status 200
  
  # Node D: Primary Heavy-Hitter (Using Local Artery for absolute stability)
  server node-d 10.0.0.13:8080 check inter 2s fall 3 rise 2 maxconn 8
  
  # Node C: Fallback Oracle (Using Tailscale Artery)
  server node-c 100.102.109.81:8080 check backup inter 5s fall 3 rise 2 maxconn 4
