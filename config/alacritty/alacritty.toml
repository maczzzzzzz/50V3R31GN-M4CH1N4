[window]
padding = { x = 10, y = 10 }
dynamic_padding = true
opacity = 0.95
title = "50V3R31GN-M4CH1N4 // HUD"

[font]
normal = { family = "VT323", style = "Regular" }
bold = { family = "VT323", style = "Bold" }
size = 14.0

[colors.primary]
background = "#000000"
foreground = "#ff0000"

[colors.normal]
black   = "#000000"
red     = "#ff0000"
green   = "#00ff00"
yellow  = "#ffff00"
blue    = "#0000ff"
magenta = "#ff00ff"
cyan    = "#00ffff"
white   = "#ffffff"

[colors.bright]
black   = "#808080"
red     = "#ff4d4d"
green   = "#4dff4d"
yellow  = "#ffff4d"
blue    = "#4d4dff"
magenta = "#ff4df7"
cyan    = "#4dffff"
white   = "#ffffff"

[cursor]
style = { shape = "Block", blinking = "Always" }
vi_mode_style = "Block"

[env]
TERM = "xterm-256color"
