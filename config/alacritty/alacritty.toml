[window]
padding = { x = 10, y = 10 }
dynamic_padding = true
opacity = 0.95
title = "50V3R31GN-M4CH1N4 // HUD"

[font]
normal = { family = "VT323", style = "Regular" }
bold = { family = "VT323", style = "Bold" }
size = 14.0

[colors.primary]
background = "#282828"
foreground = "#ebdbb2"

[colors.normal]
black   = "#282828"
red     = "#cc241d"
green   = "#98971a"
yellow  = "#d79921"
blue    = "#458588"
magenta = "#b16286"
cyan    = "#689d6a"
white   = "#a89984"

[colors.bright]
black   = "#928374"
red     = "#fb4934"
green   = "#b8bb26"
yellow  = "#fabd2f"
blue    = "#83a598"
magenta = "#d3869b"
cyan    = "#8ec07c"
white   = "#ebdbb2"

[cursor]
style = { shape = "Block", blinking = "Always" }
vi_mode_style = "Block"

[env]
TERM = "xterm-256color"
