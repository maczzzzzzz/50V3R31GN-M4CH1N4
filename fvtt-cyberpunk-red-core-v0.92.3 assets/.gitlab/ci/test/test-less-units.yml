# Test we are using relative untis for sizing things in CSS
#
# This is important so applications in the system resize properly when a user
# adjusts the Font Size in Foundry.

test-less-units:
  stage: test
  script:
    - ./.gitlab/pipeline_tests/test-less-units.sh
  needs:
    - job: init
      artifacts: true
  rules:
    # Don't run if we're in the cleanup-dev schedule
    - if: $CPR_SCHEDULE == "cleanup-dev"
      when: never
    # Run on MRs
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # Run on merge to 'master'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    # Run on git tag
    - if: $CI_COMMIT_TAG
