# Node D: Intel SYCL Runtime
# llama.cpp server compiled with Intel SYCL/OneAPI for GGUF inference on Intel GPU/NPU
services:
  llama-server:
    image: ghcr.io/ggerganov/llama.cpp:server-intel
    devices:
      - /dev/dri
    ports:
      - "8000:8000"
    volumes:
      - /var/lib/hermes/models:/models:ro
    command: >
      -m /models/qwen2.5-coder-14b-instruct-q6_k.gguf
      --host 0.0.0.0
      --port 8000
      -c 32000
      --cache-type-k q4_0
      -fa on
      -ngl 99
    restart: unless-stopped
