# NODESTADT Mesh Router -- LiteLLM Proxy Config
# 3 active inference nodes, 1 state node (Node A, no inference)
# Models must appear in /v1/models and /model/info to populate the Hermes picker.

model_list:
  # Node B -- Director (Fast Responder)
  # Hardware: Ryzen 9 5900XT, AMD 16GB VRAM, Vulkan
  # Model: Qwopus3.5-9B Q8_0 (7.2GB)
  # Benchmark: prompt 428-441 t/s, gen 53.8-55.1 t/s (Vulkan f16 KV)
  - model_name: mesh-fast
    litellm_params:
      model: openai/qwopus3.5-9b-q8
      api_base: http://10.0.0.11:8081/v1
      api_key: "os.environ/MESH_API_KEY"
      tpm: 80000
      rpm: 30
    model_info:
      id: mesh-fast
      object: model
      owned_by: nodestadt-mesh
      permission: []
      root: mesh-fast
      parent: null

  # Node C -- Oracle (Function-Calling Specialist)
  # Hardware: Ryzen 7 3700X, RTX 2060 6GB, CUDA
  # Model: Carnice-9B-FC Q4_K_M (Qwen3.5 hybrid SSM+attn)
  # Benchmark: prompt 205.2 t/s, gen 49.9 t/s
  - model_name: mesh-function-calling
    litellm_params:
      model: openai/carnice-9b-fc
      api_base: http://host.docker.internal:18081/v1
      api_key: "os.environ/MESH_API_KEY"
      tpm: 80000
      rpm: 30
    model_info:
      id: mesh-function-calling
      object: model
      owned_by: nodestadt-mesh
      permission: []
      root: mesh-function-calling
      parent: null

  # Node B -- Director (Vision Perception)
  # Hardware: Ryzen 9 5900XT, AMD 16GB VRAM, Vulkan
  # Model: Qwen3-VL-2B-Instruct Q6_K (1.4GB, image-text-to-text)
  # Benchmark: prompt 630 t/s, gen 159 t/s (text baseline)
  - model_name: mesh-vision
    litellm_params:
      model: openai/qwen3-vl-2b-instruct
      api_base: http://10.0.0.11:8082/v1
      api_key: "os.environ/MESH_API_KEY"
      tpm: 50000
      rpm: 50
    model_info:
      id: mesh-vision
      object: model
      owned_by: nodestadt-mesh
      permission: []
      root: mesh-vision
      parent: null

  # Node D -- Quaternary (Heavy Reasoning)
  # Hardware: Intel Core Ultra Meteor Lake, 48GB DDR5, CPU-only
  # Model: Qwen3.5-35B-A3B-MTP UD-Q4_K_M (MTP disabled on CPU)
  # Benchmark: prompt 12.7 t/s, gen 7.0 t/s
  - model_name: mesh-heavy
    litellm_params:
      model: openai/qwen3.5-35b-a3b-mtp
      api_base: http://host.docker.internal:18080/v1
      api_key: "os.environ/MESH_API_KEY"
      tpm: 50000
      rpm: 50
    model_info:
      id: mesh-heavy
      object: model
      owned_by: nodestadt-mesh
      permission: []
      root: mesh-heavy
      parent: null

  # Node A -- Synapse (Micro Classification/Routing)
  # Hardware: i7-7700HQ (Kaby Lake, 4c/8t), 16GB DDR4, CPU-only
  # Model: Qwen3-0.6B Q8_0 (610MB)
  # Benchmark: prompt 49.2 t/s, gen 29.1 t/s (over Tailscale from Node B)
  - model_name: mesh-micro
    litellm_params:
      model: openai/qwen3-0.6b
      api_base: http://host.docker.internal:17080/v1
      api_key: "os.environ/MESH_API_KEY"
      tpm: 80000
      rpm: 200
    model_info:
      id: mesh-micro
      object: model
      owned_by: nodestadt-mesh
      permission: []
      root: mesh-micro
      parent: null

router_settings:
  routing_strategy: simple-shuffle
  enable_pre_call_checks: true
  model_group_alias:
    "qwopus-9b": "mesh-fast"
    "carnice-9b-fc": "mesh-function-calling"
    "qwen3.5-35b-mtp": "mesh-heavy"
    "fast": "mesh-fast"
    "fc": "mesh-function-calling"
    "heavy": "mesh-heavy"
    "vision": "mesh-vision"
    "vl": "mesh-vision"
    "micro": "mesh-micro"
    "classify": "mesh-micro"
    "route": "mesh-micro"

general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  host: 0.0.0.0
  port: 4000
  telemetry: false
  # No database_url -- runs stateless (no Prisma needed for simple routing)
  # If we need persistence later, mount a volume and set sqlite:///path

environment_variables:
  LITELLM_LOG: "DEBUG"
  LITELLM_MODEL_LIST: "mesh-fast,mesh-function-calling,mesh-vision,mesh-heavy,mesh-micro"
