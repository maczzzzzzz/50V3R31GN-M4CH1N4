services:
  litellm:
    image: ghcr.io/berriai/litellm:1.85.0
    container_name: litellm-mesh
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./data:/app/data
      - ./litellm-mesh.yaml:/app/config.yaml
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - MESH_API_KEY=machina-internal-mesh-key-2026
      - DATABASE_URL=sqlite:///app/data/litellm.db
      - LITELLM_LOG=DEBUG
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]

  hermes-relay:
    build: ../hermes-relay
    container_name: hermes-relay
    restart: unless-stopped
    ports:
      - "8767:8767"
    environment:
      - HERMES_RELAY_PORT=8767
      - HERMES_RELAY_HOST=0.0.0.0
      - MESH_API_KEY=machina-internal-mesh-key-2026
    volumes:
      - ~/.hermes:/root/.hermes:ro

networks:
  default:
    name: mesh-network
    driver: bridge
