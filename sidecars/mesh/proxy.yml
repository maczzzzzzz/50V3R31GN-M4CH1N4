services:
  litellm:
    # Pinned to 1.84.0 -- patches critical SQL injection CVE (litellm <1.83).
    # Do NOT use main-latest (floating tag causes version regression).
    image: ghcr.io/berriai/litellm:1.84.0
    ports:
      - "4000:4000"
    volumes:
      - ./litellm-mesh.yaml:/app/config.yaml
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - MESH_API_KEY=${MESH_API_KEY}
    env_file:
      - .env
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    restart: unless-stopped
