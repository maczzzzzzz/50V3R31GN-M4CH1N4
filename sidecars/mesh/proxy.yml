services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./litellm-mesh.yaml:/app/config.yaml
    environment:
      - SOVEREIGN_MESH_PROXY_KEY=sk-sovereign-mesh-proxy
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    restart: unless-stopped
