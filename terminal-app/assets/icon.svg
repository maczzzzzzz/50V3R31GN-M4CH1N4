<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- White Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feFlood flood-color="#ffffff" flood-opacity="0.5" result="color" />
      <feComposite in="color" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Scanline Pattern (Neutral White) -->
    <pattern id="scanlines" width="100%" height="4" patternUnits="userSpaceOnUse">
      <rect width="100%" height="2" fill="rgba(255, 255, 255, 0.05)" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#000000" />

  <!-- Logo Group -->
  <g filter="url(#glow)">
    <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" 
          fill="#ffffff" font-family="monospace" font-size="42" font-weight="bold"
          letter-spacing="2">
      50V3R31GN-M4CH1N4
    </text>
  </g>

  <!-- CRT Overlay (Scanlines) -->
  <rect width="512" height="512" fill="url(#scanlines)" pointer-events="none" />
  
  <!-- Neutral Border -->
  <rect x="10" y="10" width="492" height="492" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.2" />
  
  <!-- Sovereign Watermark -->
  <text x="502" y="502" text-anchor="end" fill="#ffffff" font-family="monospace" font-size="10" opacity="0.3">
    // 50V3R31GN-M4CH1N4
  </text>
</svg>
