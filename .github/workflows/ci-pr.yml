name: Sovereign CI (PR)

on:
  pull_request:
    branches:
      - beta/v3
      - master
      - main

jobs:
  nix-evaluate-and-audit:
    name: Nix Flake Evaluation & Submodule Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Monorepo
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Verify Flake Inputs
        run: nix flake check --show-trace

      - name: Build System Configurations (Dry Run)
        run: |
          echo ":: Building Node Configurations..."
          nix build .#nixosConfigurations.node-a.config.system.build.toplevel --dry-run
          nix build .#nixosConfigurations.node-b.config.system.build.toplevel --dry-run
          nix build .#nixosConfigurations.node-d.config.system.build.toplevel --dry-run

      - name: Submodule Strict Pinning Audit
        run: |
          chmod +x scripts/check-upstream-updates.sh
          ./scripts/check-upstream-updates.sh
